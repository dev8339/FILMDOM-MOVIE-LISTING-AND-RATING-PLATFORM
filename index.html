<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILMDOM | Premium Movie Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-white">

    <nav class="fixed top-0 w-full z-50 px-6 md:px-10 py-4 flex justify-between items-center backdrop-blur-xl border-b border-white/5">
        <img src="1000047609.png" alt="FILMDOM Logo" class="h-16 md:h-24 transition-transform hover:scale-105 cursor-pointer">
        
        <div class="flex items-center gap-4">
            <div class="relative flex items-center">
                <input type="text" id="searchInput" placeholder="Search by title or genre..." 
                    class="bg-white/5 border border-white/10 rounded-l-full px-5 py-2 focus:border-[#fbbf24] outline-none transition-all text-sm w-32 md:w-64">
                <button id="searchBtn" class="bg-white/10 border border-l-0 border-white/10 rounded-r-full px-4 py-2 hover:text-[#fbbf24] transition">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
            <button onclick="openAuth()" class="bg-[#fbbf24] text-black px-6 py-2 rounded-full font-black text-xs uppercase tracking-widest hover:brightness-110 transition">
                Sign In
            </button>
        </div>
    </nav>

   <header class="pt-32 pb-12 text-center">
    <h1 class="text-6xl md:text-[9xl] font-black uppercase leading-none tracking-tighter">
        <span style="color: white;">FILM</span><span style="color: #fbbf24; text-shadow: 0 0 25px rgba(251, 191, 36, 0.6);">DOM</span>
    </h1>
    <p class="text-gray-500 tracking-[0.8em] uppercase text-[10px] md:text-xs mt-4">
        Premium Motion Picture Collection
    </p>
</header>


    <main class="container mx-auto px-6 md:px-10 pb-32">
        <div id="movieGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
            </div>
    </main>

    <div id="movieModal" class="fixed inset-0 z-[100] hidden bg-black/95 backdrop-blur-2xl flex items-center justify-center p-6">
        <div class="bg-[#0f172a] border border-white/10 rounded-3xl max-w-5xl w-full p-8 relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-4xl hover:text-[#fbbf24] transition">×</button>
            <div id="modalContent" class="flex flex-col md:flex-row gap-10">
                </div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-[200] hidden bg-black/90 flex items-center justify-center p-4">
        <div class="bg-[#111827] border border-[#fbbf24]/30 p-10 rounded-3xl w-full max-w-md text-center shadow-2xl">
            <h2 class="text-3xl font-black mb-8 text-[#fbbf24]">JOIN THE ELITE</h2>
            <form onsubmit="event.preventDefault(); alert('Login Successful!'); closeAuth();">
                <input type="email" required placeholder="Email Address" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 outline-none focus:border-[#fbbf24]">
                <input type="password" required placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-8 outline-none focus:border-[#fbbf24]">
                <button type="submit" class="w-full bg-[#fbbf24] text-black font-black py-4 rounded-xl hover:scale-105 transition uppercase tracking-widest">Enter Cinema</button>
            </form>
            <button onclick="closeAuth()" class="mt-6 text-gray-500 hover:text-white transition text-xs uppercase tracking-widest underline underline-offset-4">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
